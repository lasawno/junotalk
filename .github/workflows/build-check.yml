name: Build Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run check

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production
          # Build only needs these to be non-empty so it doesn't crash on missing vars.
          # Real secrets are never stored here — they live in Replit environment secrets.
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          SESSION_SECRET: "placeholder-session-secret-for-build-check"
          GROQ_API_KEY: "placeholder"

      - name: Verify build output exists
        run: |
          echo "--- Checking dist/ ---"
          ls -lh dist/
          if [ ! -f dist/index.cjs ]; then
            echo "ERROR: dist/index.cjs not found — server bundle missing"
            exit 1
          fi
          if [ ! -d dist/public ]; then
            echo "ERROR: dist/public not found — frontend bundle missing"
            exit 1
          fi
          echo "Build output verified."
